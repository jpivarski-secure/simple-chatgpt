<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta charset="utf-8">
    <title>ChatGPT</title>
    <style>
      body {
          font-family: Arial, Helvetica, sans-serif;
          background: black;
          font-size: 1em;
          line-height: 1.2;
      }

      #clear-all {
          float: right;
          background: black;
          color: yellow;
          font-size: 1em;
          line-height: 1.2;
          border: 1px solid #808000;
      }

      details {
          color: #ffff00;
          margin-bottom: 10px;
          font-size: 1em;
          line-height: 1.2;
      }

      input {
          border: 1px solid #808000;
          background: black;
          color: #ffff00;
          outline: none;
          font-size: 1em;
          line-height: 1.2;
      }

      label {
          color: #ffff00;
      }

      a {
          font-family: Arial, Helvetica, sans-serif;
          font-size: 1em;
          line-height: 1.2;
          color: #00ff00;
      }

      a:visited {
          color: #00ff00;
      }

      #controls {
          margin-bottom: 6px;
      }

      .controls-row {
          margin-bottom: 4px;
      }

      #reasoning-wrapper {
          position: relative;
          display: inline-block;
      }

      #reasoning-menu {
          position: absolute;
          top: calc(100% + 2px);
          left: 0;
          display: none;
          border: 1px solid #808000;
          background: black;
          color: #ffff00;
          z-index: 10;
      }

      .reasoning-option {
          padding: 4px 8px;
          border-bottom: 1px solid #808000;
      }

      .reasoning-option:last-child {
          border-bottom: 0;
      }

      #messages {
          margin-bottom: 60vh;
      }

      .message {
          width: 100%;
          margin-top: 10px;
          color: #ffff00;
      }

      .user-message {
          display: inline-block;
          width: calc(100% - 50px);
          min-height: 1em;
          overflow: hidden;
          outline: none;
          resize: none;
          padding: 8px;
          box-sizing: border-box;
          border: 1px solid #808000;
          font-size: 1em;
          line-height: 1.2;
      }

      .attachment-controls {
          margin-top: 2px;
          margin-left: 0;
          color: #ffff00;
      }

      .attachment-line {
          white-space: pre-wrap;
      }

      .attachment-toggle {
          display: inline-block;
          width: 1em;
          text-align: center;
          cursor: pointer;
          user-select: none;
      }

      .message svg {
          margin-left: 3px;
          margin-bottom: 3px;
      }

      .ai-message {
          font-family: Arial, Helvetica, sans-serif;
          padding: 2px;
          margin: 0;
          white-space: pre-wrap;
          color: #00ff00;
          font-size: 1em;
          line-height: 1.2;
      }

      .sources {
          margin-top: 4px;
      }

    </style>
  </head>
  <body>
    <button id="clear-all">Clear</button>

    <details><summary>System</summary>
      <div class="message">
        <div class="user-message" id="system-message" contenteditable="plaintext-only"></div>
      </div>
    </details>

    <div id="controls">
      <div class="controls-row">
        <input id="model" size="8" type="input" placeholder="Model...">
        <span id="reasoning-wrapper">
          <input id="reasoning-effort" size="6" type="input" placeholder="Reason...">
          <div id="reasoning-menu">
            <div class="reasoning-option">none</div>
            <div class="reasoning-option">minimal</div>
            <div class="reasoning-option">low</div>
            <div class="reasoning-option">medium</div>
            <div class="reasoning-option">high</div>
            <div class="reasoning-option">xhigh</div>
          </div>
        </span>
        <input id="temp" size="4" type="input" placeholder="Temp...">
        <input id="key" size="4" type="password" placeholder="API key...">
      </div>
      <div class="controls-row">
        <label><input id="web-search" type="checkbox"> web</label>
      </div>
    </div>

    <div id="messages"></div>

    <script>
      function syncDivToLocalStorage(id) {
          const element = document.getElementById(id);
          element.textContent = localStorage.getItem(id)  ||  "You are knowledgeable about facts and opinions held around the world and are willing to investigate my questions from all angles and thought traditions. You do not flatter, but get to the point right away. You will tell me I'm wrong when I'm wrong, but you'll also admit when you don't know the answer to a question. No need for \"TLDR\" or a summary table; make each of your points only once.";
          element.addEventListener("input", () => { localStorage.setItem(id, element.textContent); });
          element.addEventListener("paste", () => { localStorage.setItem(id, element.textContent); });
      }
      function syncInputToLocalStorage(id) {
          const element = document.getElementById(id);
          element.value = localStorage.getItem(id)  ||  "";
          element.addEventListener("input", () => { localStorage.setItem(id, element.value); });
          element.addEventListener("paste", () => { localStorage.setItem(id, element.value); });
      }
      syncDivToLocalStorage("system-message");
      syncInputToLocalStorage("model");
      syncInputToLocalStorage("reasoning-effort");
      syncInputToLocalStorage("temp");
      syncInputToLocalStorage("key");
      syncCheckboxToLocalStorage("web-search");

      document.getElementById("clear-all").addEventListener("click", () => {
          if (activeRequest != null) {
              activeRequest.controller.abort();
              activeRequest = null;
          }
          attachedFiles.clear();
          while (messages.firstChild) {
              messages.removeChild(messages.firstChild);
          }
          newUserMessage();
          localStorage.setItem("history", "");
      });

      function getHistory() {
          return JSON.stringify(Array.from(messages.children).map(message => ({
              user: message.querySelector(".user-message").innerText,
              assistant: message.querySelector(".ai-message").dataset.rawText  ||  "",
              sources: Array.from(message.querySelectorAll(".sources a")).map(x => x.href),
              attachments: Array.from(message.querySelectorAll(".attachment-line")).map(x => x.dataset.path),
          })));
      }

      function syncCheckboxToLocalStorage(id) {
          const element = document.getElementById(id);
          element.checked = localStorage.getItem(id) == "true";
          element.addEventListener("change", () => { localStorage.setItem(id, element.checked); });
      }

      function newUserMessage() {
          messages.insertAdjacentHTML("beforeend", newMessageAsHTML);
          const message = messages.lastElementChild;
          const svg = message.querySelector("svg");
          const fileInput = message.querySelector(".attachment-input");
          const addButton = message.querySelector(".attachment-add");
          svg.dataset.mode = "send";
          svg.addEventListener("click", () => {
              if (svg.dataset.mode == "stop") {
                  stop(message);
              }
              else {
                  send(message).catch(error => {
                      setAiMessageText(message.querySelector(".ai-message"), `[${error.toString()}]`);
                  });
              }
          });
          addButton.addEventListener("click", () => fileInput.click());
          fileInput.addEventListener("change", () => {
              for (const file of fileInput.files) {
                  addAttachment(message, file, getAttachmentPath(file, fileInput));
              }
              fileInput.value = "";
          });
      }

      function setButtonToSend(svg) {
          svg.dataset.mode = "send";
          svg.querySelector(".send-shape").style.display = "";
          svg.querySelector(".stop-shape").style.display = "none";
      }

      function setButtonToStop(svg) {
          svg.dataset.mode = "stop";
          svg.querySelector(".send-shape").style.display = "none";
          svg.querySelector(".stop-shape").style.display = "";
      }

      function finishRequest(message, needsNewMessage) {
          activeRequest = null;
          if (!message.isConnected) {
              return;
          }
          const svg = message.querySelector("svg");
          setButtonToSend(svg);
          localStorage.setItem("history", getHistory());
          if (needsNewMessage) {
              newUserMessage();
          }
      }

      function stop(message) {
          if (activeRequest != null  &&  activeRequest.message == message) {
              activeRequest.controller.abort();
          }
      }

      function showReasoningMenu() {
          reasoningMenu.style.display = "block";
      }

      function hideReasoningMenu() {
          reasoningMenu.style.display = "none";
      }

      function appendReasoningSummary(output, item) {
          if (item == null  ||  item.type != "reasoning"  ||  !("summary" in item)) {
              return;
          }
          if (item.id != null  &&  renderedReasoningItems.has(item.id)) {
              return;
          }
          appendAiMessageText(output, "---- Reasoning -----\n");
          if (Array.isArray(item.summary)) {
              const summary = item.summary.map(x => x.text  ||  "").join("");
              appendAiMessageText(output, summary);
              if (summary != ""  &&  !summary.endsWith("\n")) {
                  appendAiMessageText(output, "\n");
              }
          }
          appendAiMessageText(output, "\n---- Response ------\n");
          if (item.id != null) {
              renderedReasoningItems.add(item.id);
          }
      }

      function renderAiMessage(output) {
          const text = output.dataset.rawText  ||  "";
          output.textContent = "";
          const regex = /\[([^\]]*)\]\(([^)]+)\)/g;
          let lastIndex = 0;
          let match;
          while ((match = regex.exec(text)) != null) {
              output.appendChild(document.createTextNode(text.slice(lastIndex, match.index)));
              output.appendChild(document.createTextNode("[" + match[1] + "]("));
              const a = document.createElement("a");
              a.href = match[2];
              a.target = "_blank";
              a.rel = "noopener noreferrer";
              a.textContent = match[2];
              output.appendChild(a);
              output.appendChild(document.createTextNode(")"));
              lastIndex = regex.lastIndex;
          }
          output.appendChild(document.createTextNode(text.slice(lastIndex)));
      }

      function setAiMessageText(output, text) {
          output.dataset.rawText = text;
          renderAiMessage(output);
      }

      function appendAiMessageText(output, text) {
          output.dataset.rawText = (output.dataset.rawText  ||  "") + text;
          renderAiMessage(output);
      }

      function shortenMiddle(text, length) {
          if (text.length <= length) {
              return text;
          }
          const left = Math.ceil((length - 3) / 2);
          const right = Math.floor((length - 3) / 2);
          return text.slice(0, left) + "..." + text.slice(text.length - right);
      }

      function renderSources(container, sources) {
          container.textContent = "";
          if (sources.length == 0) {
              return;
          }
          container.appendChild(document.createTextNode("\n---- References ----\n"));
          container.appendChild(document.createElement("br"));
          for (const url of sources) {
              const a = document.createElement("a");
              a.href = url;
              a.target = "_blank";
              a.rel = "noopener noreferrer";
              a.textContent = shortenMiddle(url, 50);
              container.appendChild(a);
              container.appendChild(document.createElement("br"));
          }
      }

      function collectWebSources(response) {
          const urls = [];
          const seen = new Set();
          for (const item of response.output  ||  []) {
              if (item.type == "web_search_call"  &&  Array.isArray(item.action?.sources)) {
                  for (const source of item.action.sources) {
                      if (source.url != null  &&  !seen.has(source.url)) {
                          urls.push(source.url);
                          seen.add(source.url);
                      }
                  }
              }
          }
          return urls;
      }

      function getAttachmentRecords(message) {
          return Array.from(message.querySelectorAll(".attachment-line")).map(line => ({
              path: line.dataset.path,
              file: attachedFiles.get(line.dataset.attachmentId)  ||  null,
          }));
      }

      function addAttachment(message, file, path) {
          attachmentCounter += 1;
          const id = "attachment-" + attachmentCounter;
          attachedFiles.set(id, file);
          addAttachmentLine(message, path, id);
      }

      function getAttachmentPath(file, fileInput) {
          return file.name;
      }

      function addAttachmentLine(message, path, attachmentId) {
          const list = message.querySelector(".attachment-list");
          const line = document.createElement("div");
          line.className = "attachment-line";
          line.dataset.path = path;
          line.dataset.attachmentId = attachmentId;

          const toggle = document.createElement("span");
          toggle.className = "attachment-toggle";
          toggle.textContent = "−";
          toggle.addEventListener("click", () => {
              attachedFiles.delete(attachmentId);
              line.remove();
          });
          line.appendChild(toggle);
          line.appendChild(document.createTextNode(path));
          list.appendChild(line);
      }

      async function fileToDataUrl(file) {
          return await new Promise((resolve, reject) => {
              const reader = new FileReader();
              reader.onload = () => resolve(reader.result);
              reader.onerror = () => reject(reader.error  ||  new Error("Could not read file."));
              reader.readAsDataURL(file);
          });
      }

      async function send(message) {
          if (activeRequest != null) {
              return;
          }
          if (!model.value  ||  !temp.value  ||  !key.value) {
              return;
          }
          const temperature = Number(temp.value);
          if (temperature < 0  ||  temperature > 2) {
              return;
          }

          while (message.nextSibling) {
              messages.removeChild(message.nextSibling);
          }
          const output = message.querySelector(".ai-message");
          const sources = message.querySelector(".sources");
          setAiMessageText(output, "");
          sources.textContent = "";

          localStorage.setItem("history", getHistory());

          let listOfMessages = [{role: "system", content: systemMessage.textContent}];
          for (let child of messages.children) {
              const userText = child.querySelector(".user-message").textContent;
              const assistantText = child.querySelector(".ai-message").dataset.rawText  ||  "";
              const attachments = getAttachmentRecords(child);
              if (userText.trim() != ""  ||  attachments.length != 0) {
                  if (attachments.length == 0) {
                      listOfMessages.push({role: "user", content: userText});
                  }
                  else {
                      const content = [];
                      for (const attachment of attachments) {
                          if (attachment.file == null) {
                              throw new Error(`Attachment unavailable: ${attachment.path}. Reattach the file.`);
                          }
                          content.push({
                              type: "input_file",
                              filename: attachment.file.name,
                              file_data: await fileToDataUrl(attachment.file),
                          });
                      }
                      if (userText != "") {
                          content.push({type: "input_text", text: userText});
                      }
                      listOfMessages.push({role: "user", content: content});
                  }
              }
              if (assistantText.trim() != "") {
                  listOfMessages.push({role: "assistant", content: assistantText});
              }
          }

          let body = {
              model: model.value,
              temperature: temperature,
              input: listOfMessages,
              store: false,
              stream: true,
          };
          const effort = reasoningEffort.value.trim();
          if (effort != ""  &&  !model.value.startsWith("gpt-4.1")) {
              body["reasoning"] = {
                  effort: effort,
                  summary: "concise",
              };
          }
          if (webSearch.checked) {
              body["tools"] = [{type: "web_search"}];
              body["tool_choice"] = "auto";
              body["include"] = ["web_search_call.action.sources"];
          }

          const controller = new AbortController();
          const svg = message.querySelector("svg");
          renderedReasoningItems = new Set();
          setButtonToStop(svg);
          activeRequest = {message: message, controller: controller};

          fetch("https://api.openai.com/v1/responses", {
              method: "POST",
              headers: {
                  "Content-Type": "application/json",
                  "Authorization": "Bearer " + key.value,
              },
              signal: controller.signal,
              body: JSON.stringify(body),

          }).then(async response => {
              if (!response.ok) {
                  let message = `HTML response is ${response.status}.`;
                  try {
                      const errorBody = await response.json();
                      message = errorBody.error?.message  ||  message;
                  }
                  catch (error) {
                  }
                  throw new Error(message);
              }

              const reader = response.body.getReader();
              const decoder = new TextDecoder("utf-8");
              let done = false;
              let buffer = "";

              while (!done) {
                  const { value, done: readerDone } = await reader.read();
                  done = readerDone;
                  if (done) {
                      break;
                  }

                  buffer += decoder.decode(value, { stream: true });

                  let index;
                  while ((index = buffer.indexOf("\n")) !== -1) {
                      const line = buffer.slice(0, index).trim();
                      buffer = buffer.slice(index + 1);
                      if (line === ""  ||  !line.startsWith("data:")) {
                          continue;
                      }

                      const data = line.slice(5).trim();
                      if (data === "[DONE]") {
                          done = true;
                          break;
                      }

                      try {
                          const json = JSON.parse(data);
                          if (json.type == "response.output_text.delta") {
                              appendAiMessageText(output, json.delta  ||  "");
                          }
                          else if (json.type == "response.output_item.done") {
                              appendReasoningSummary(output, json.item);
                          }
                          else if (json.type == "response.completed") {
                              if (Array.isArray(json.response?.output)) {
                                  for (const item of json.response.output) {
                                      appendReasoningSummary(output, item);
                                  }
                              }
                              renderSources(sources, collectWebSources(json.response  ||  {}));
                          }
                          else if (json.type == "error") {
                              throw new Error(json.error?.message  ||  "Streaming error.");
                          }
                      }
                      catch (error) {
                          throw new Error(`${error.toString()} in chunk:\n\n${data}`);
                      }
                  }
              }

              finishRequest(message, true);

          }).catch(error => {
              if (error.name == "AbortError") {
                  finishRequest(message, true);
              }
              else {
                  setAiMessageText(output, `[${error.toString()}]`);
                  finishRequest(message, false);
              }
          });
      }

      let messages = document.getElementById("messages");
      let systemMessage = document.getElementById("system-message");
      let model = document.getElementById("model");
      let reasoningEffort = document.getElementById("reasoning-effort");
      let reasoningMenu = document.getElementById("reasoning-menu");
      let temp = document.getElementById("temp");
      let key = document.getElementById("key");
      let webSearch = document.getElementById("web-search");
      let activeRequest = null;
      let renderedReasoningItems = new Set();
      let attachedFiles = new Map();
      let attachmentCounter = 0;
      const sendButtonShape = `
    <g class="send-shape" transform="translate(-38.425328,-84.136154)">
      <path style="fill:#ffff00;stroke:#ffff00;stroke-width:10;stroke-linejoin:round;" d="M 52.567223,151.75928 43.425096,190.61331 144.44559,139.87452 43.425096,89.135727 l 9.142127,38.854033 91.878367,11.88476 z"/>
    </g>
`;
      const stopButtonShape = `
    <circle class="stop-shape" cx="55.509825" cy="55.738365" r="34" style="display:none;fill:#ffff00;stroke:#ffff00;stroke-width:10;stroke-linejoin:round;"/>
`;

      const newMessageAsHTML = `
<div class="message">
  <div class="user-message" contenteditable="plaintext-only"></div>
  <svg viewBox="0 0 111.01965 111.47673" width="2em">
${sendButtonShape}
${stopButtonShape}
  </svg>
  <div class="attachment-controls">
    <div class="attachment-list"></div>
    <div><span class="attachment-toggle attachment-add">+</span></div>
    <input class="attachment-input" type="file" multiple style="display:none;">
  </div>
  <pre class="ai-message"></pre>
  <div class="sources"></div>
</div>
`;

      reasoningEffort.addEventListener("focus", showReasoningMenu);
      reasoningEffort.addEventListener("click", showReasoningMenu);
      reasoningEffort.addEventListener("input", showReasoningMenu);
      reasoningEffort.addEventListener("blur", () => {
          setTimeout(hideReasoningMenu, 100);
      });
      for (const option of reasoningMenu.children) {
          option.addEventListener("mousedown", event => {
              event.preventDefault();
              reasoningEffort.value = option.textContent;
              localStorage.setItem("reasoning-effort", reasoningEffort.value);
              hideReasoningMenu();
              reasoningEffort.blur();
          });
      }

      const history = localStorage.getItem("history")  ||  "";
      if (history == "") {
          newUserMessage();
      }
      else {
          for (const message of Object.values(JSON.parse(history))) {
              if (message.user != "") {
                  newUserMessage();
                  const last = messages.lastElementChild;
                  last.querySelector(".user-message").innerText = message.user;
                  if (message.assistant == "") {
                      setAiMessageText(last.querySelector(".ai-message"), "[No saved response.]");
                  }
                  else {
                      setAiMessageText(last.querySelector(".ai-message"), message.assistant);
                  }
                  if (Array.isArray(message.attachments)) {
                      for (const path of message.attachments) {
                          attachmentCounter += 1;
                          addAttachmentLine(last, path, "attachment-" + attachmentCounter);
                      }
                  }
                  if (Array.isArray(message.sources)) {
                      renderSources(last.querySelector(".sources"), message.sources);
                  }
              }
          }
          newUserMessage();
      }

    </script>
  </body>
</html>
